name: Kotlin Monorepo - Update Application Versions

on:
  workflow_call:
    inputs:
      apps_dir:
        description: "Directory containing the apps"
        type: string
        default: "src/apps"
        required: false
      apps:
        description: "Comma-separated list of app names to update"
        type: string
        required: true
      bump_type:
        description: "Type of version bump (major, minor, patch)"
        type: string
        required: true
    secrets:
      APP_CLIENT_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  bump-versions:
    name: Bump versions
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set inputs
        id: set-inputs
        run: |
          echo "apps_dir=${{ github.event.inputs.apps_dir }}" >> $GITHUB_OUTPUT
          echo "apps=${{ github.event.inputs.apps }}" >> $GITHUB_OUTPUT
          echo "bump_type=${{ github.event.inputs.bump_type }}" >> $GITHUB_OUTPUT

          echo "Received inputs:"
          echo "- apps_dir: ${{ github.event.inputs.apps_dir }}"
          echo "- apps: ${{ github.event.inputs.apps }}"
          echo "- bump_type: ${{ github.event.inputs.bump_type }}"

      - name: Bump versions
        run: |
          IFS=',' read -ra APP_ARRAY <<< "${{ steps.set-inputs.outputs.apps }}"

          for app in "${APP_ARRAY[@]}"; do
            app=$(echo "$app" | xargs)  # trim whitespace
            file="${{ steps.set-inputs.outputs.apps_dir }}/$app/build.gradle.kts"

            if [ ! -f "$file" ]; then
              echo "File $file not found"
              exit 1
            fi

            current_version=$(grep 'version = ' "$file" | sed 's/version = "\(.*\)"/\1/')
            echo "Current version for $app: $current_version"

            IFS='.' read -ra VERSION_PARTS <<< "$current_version"
            major=${VERSION_PARTS[0]}
            minor=${VERSION_PARTS[1]}
            patch=${VERSION_PARTS[2]}

            case "${{ steps.set-inputs.outputs.bump_type }}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
            esac

            new_version="$major.$minor.$patch"
            echo "> New version for $app: $new_version"
            sed -i "s/version = \".*\"/version = \"$new_version\"/" "$file"
          done

      - name: Setup git user
        id: setup-git-user
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.setup-git-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Commit changes
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump versions for apps: ${{ steps.set-inputs.outputs.apps }} (${{ steps.set-inputs.outputs.bump_type }})"
            git push
          fi

      - name: Trigger build workflow
        if: success()
        run: |
          curl -X POST \
           -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
           -H "Accept: application/vnd.github.v3+json" \
           https://api.github.com/repos/${{ github.repository }}/dispatches \
           -d '{"event_type": "version-bumped", "client_payload": {"apps": "${{ steps.set-inputs.outputs.apps }}", "apps_dir": "${{ steps.set-inputs.outputs.apps_dir }}"}}'
